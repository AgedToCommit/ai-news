<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI News — for Gabe</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --ink: #e8eaed;
    --muted: #8b95a1;
    --accent: #7cc5ff;
    --border: #1f262d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; line-height: 1.55; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 64px 24px 96px; }
  h1 { font-size: 32px; margin: 0 0 8px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); margin: 0 0 48px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; }
  .panel h2 { margin: 0 0 12px; font-size: 18px; }
  .panel p { margin: 0; color: var(--muted); }
  code { background: #1f262d; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI News</h1>
  <p class="sub">Curated daily for Gabe. Page is empty until the first scheduled run posts a digest.</p>

  <div class="panel">
    <h2>Setup in progress</h2>
    <p>This page will start filling in once the scheduled agent runs its first cycle. The full design lives in <code>SPEC.md</code> in this repo.</p>
  </div>
</div>
</body>
</html>
